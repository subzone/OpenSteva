name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-14
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: ubuntu-22.04
            target: ''
            name: Linux-x64
          - platform: windows-latest
            target: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteva-${{ matrix.name }}
          path: |
            frontend/src-tauri/target/**/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/**/release/bundle/macos/*.app
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: OpenSteva Desktop v${{ inputs.version }}
          body: |
            ## OpenSteva Desktop v${{ inputs.version }}

            Local-first AI code assistant. No cloud required.

            ### Downloads
            - **macOS (Apple Silicon):** `.dmg` file
            - **macOS (Intel):** `.dmg` file
            - **Linux:** `.deb` or `.AppImage`
            - **Windows:** `.exe` installer

            ### First run
            1. Install [Ollama](https://ollama.com)
            2. Run `ollama pull qwen2.5-coder:7b`
            3. Launch OpenSteva

            > macOS unsigned build: right-click → Open on first launch
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.exe
