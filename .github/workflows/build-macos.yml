name: Build macOS Desktop (Unsigned)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri app (unsigned)
        working-directory: frontend
        run: npx tauri build --target aarch64-apple-darwin
        env:
          TAURI_CONFIG: '{"version":"0.1.0"}'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteva-macOS-arm64
          path: |
            frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
